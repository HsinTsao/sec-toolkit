# Docker Compose HTTPS 覆盖配置
# SSL 终止在 Nginx（前端容器），后端保持 HTTP（Docker 内部网络安全）
#
# 前置条件: 在项目根目录 certs/ 下放置证书文件
#   - certs/server.crt  (证书)
#   - certs/server.key  (私钥)
#   可通过 ./start.sh ssl 生成自签名证书
#
# 使用方法: docker compose -f docker-compose.yml -f docker-compose.ssl.yml up -d

services:
  frontend:
    ports:
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/ssl:ro
      - ./frontend/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:443"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
