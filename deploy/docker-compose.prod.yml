# Security Toolkit 生产部署配置
#
# 此文件用于两种场景：
# 1. GitHub 拉代码到服务器后，在仓库 deploy/ 目录执行
# 2. 使用 export-image.sh 生成的离线包，在解压目录执行
#
# 关键原则：
# - 数据库落在宿主机 ./data，而不是 Docker named volume
# - .env 由宿主机维护，不随镜像覆盖
# - 默认使用已有镜像；需要源码构建时请改用仓库根目录 docker-compose.yml

services:
  backend:
    image: sec-toolkit-backend:latest
    container_name: toolkit-backend
    restart: unless-stopped
    init: true
    ports:
      - "${APP_API_PORT:-8000}:8000"
    volumes:
      - ${APP_DATA_DIR:-./data}:/app/data
      - ${APP_BACKEND_LOG_DIR:-./logs/backend}:/app/logs
    env_file:
      - .env
    environment:
      - LOG_FILE=/app/logs/backend.log
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - toolkit-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  frontend:
    image: sec-toolkit-frontend:latest
    container_name: toolkit-frontend
    restart: unless-stopped
    init: true
    ports:
      - "${APP_HTTP_PORT:-80}:80"
    volumes:
      - ${APP_NGINX_LOG_DIR:-./logs/nginx}:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - toolkit-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  toolkit-network:
    driver: bridge
