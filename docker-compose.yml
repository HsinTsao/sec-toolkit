# Security Toolkit Docker 配置
#
# 配置方式: 复制 env.example 为 .env 并编辑
# 所有 .env 中的配置会自动传递给后端容器
#
# 启动命令: docker compose up -d
# 查看日志: docker compose logs -f

services:
  backend:
    image: sec-toolkit-backend:${IMAGE_TAG:-local}
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.11-slim}
    container_name: toolkit-backend
    restart: unless-stopped
    init: true
    ports:
      - "${APP_API_PORT:-8000}:8000"
    volumes:
      - ${APP_DATA_DIR:-./data}:/app/data
      - ${APP_BACKEND_LOG_DIR:-./logs/backend}:/app/logs
    env_file:
      - .env
    environment:
      - LOG_FILE=/app/logs/backend.log
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - toolkit-network
    # 资源限制（根据服务器配置调整）
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    # 日志配置（防止日志无限增长）
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  frontend:
    image: sec-toolkit-frontend:${IMAGE_TAG:-local}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:20-alpine}
        NGINX_BASE_IMAGE: ${NGINX_BASE_IMAGE:-nginx:alpine}
    container_name: toolkit-frontend
    restart: unless-stopped
    init: true
    ports:
      - "${APP_HTTP_PORT:-80}:80"
    volumes:
      - ${APP_NGINX_LOG_DIR:-./logs/nginx}:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - toolkit-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  toolkit-network:
    driver: bridge
